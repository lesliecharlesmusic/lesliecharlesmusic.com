  <script src="downloads.js"></script>
  <script>
    (function () {
      var list = document.getElementById('downloads-list');

      downloads.forEach(function (item) {
        var li = document.createElement('li');
        li.className = 'dl-item';

        // Thumbnail (optional)
        if (item.art) {
          var thumb = document.createElement('img');
          thumb.className = 'dl-thumb';
          thumb.src = item.art;
          thumb.alt = item.name;
          thumb.width = 1758;
          thumb.height = 1276;
          thumb.loading = 'eager';
          li.appendChild(thumb);
        }

        // Info block
        var info = document.createElement('div');
        info.className = 'dl-info';

        var name = document.createElement('h2');
        name.className = 'dl-name';
        name.textContent = item.name;

        var meta = document.createElement('p');
        meta.className = 'dl-meta';
        meta.textContent = [
          item.format.join(' / '),
          item.platform.join(', '),
          item.arch.join(', '),
          'v' + item.version
        ].join(' · ');

        var desc = document.createElement('p');
        desc.className = 'dl-desc';
        desc.textContent = item.description;

        var updated = document.createElement('p');
        updated.className = 'dl-updated';
        updated.textContent = 'Updated ' + item.updated;

        info.appendChild(name);
        info.appendChild(meta);
        info.appendChild(desc);
        info.appendChild(updated);

        // Actions block
        var actions = document.createElement('div');
        actions.className = 'dl-actions';

        var btn = document.createElement('a');
        btn.className = 'dl-btn';
        btn.href = item.file;
        btn.setAttribute('download', '');
        btn.textContent = 'Download — ' + item.size;

        actions.appendChild(btn);

        if (item.changelog) {
          var log = document.createElement('a');
          log.href = item.changelog;
          log.target = '_blank';
          log.rel = 'noopener noreferrer';
          log.style.display = 'block';
          log.style.marginTop = '0.5rem';
          log.style.fontSize = 'var(--xs)';
          log.style.color = 'var(--muted)';
          log.textContent = 'Changelog';
          actions.appendChild(log);
        }

        li.appendChild(info);
        li.appendChild(actions);
        list.appendChild(li);
      });
    }());
  </script>
