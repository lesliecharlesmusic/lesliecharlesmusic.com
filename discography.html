  <script src="discography.js"></script>
  <script>
    (function () {
      var grid = document.getElementById('disc-grid');

      discography.forEach(function (item, i) {
        var li = document.createElement('li');
        li.className = 'disc-item';

        var a = document.createElement('a');
        a.href = item.link;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';

        var img = document.createElement('img');
        img.src = item.art;
        img.alt = item.album + ' by ' + item.artist;
        img.width = 600;
        img.height = 600;
        img.loading = i < 8 ? 'eager' : 'lazy';

        a.appendChild(img);
        li.appendChild(a);

        var caption = document.createElement('div');
        caption.className = 'disc-caption';

        var spanAlbum = document.createElement('span');
        spanAlbum.className = 'disc-album';
        spanAlbum.textContent = item.album;

        var spanArtist = document.createElement('span');
        spanArtist.className = 'disc-artist';
        spanArtist.textContent = item.artist;

        caption.appendChild(spanAlbum);
        caption.appendChild(spanArtist);

        if (item.role) {
          var spanRole = document.createElement('span');
          spanRole.className = 'disc-role';
          spanRole.textContent = item.role;
          caption.appendChild(spanRole);
        }

        li.appendChild(caption);
        grid.appendChild(li);
      });
    }());
  </script>
